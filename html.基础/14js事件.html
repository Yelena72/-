<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS事件</title>
    <!--
        onClick:点击
        onMouseOver:鼠标经过
        onMouseOUt:鼠标移出
        onChange:文本内容改变
        onSelect:文本框选中
        onFocus:光标聚集
        onBlur:移开光标 
    -->
</head>
<body>
    <button onclick="click_event()">这是一个点击事件按钮</button>
    <input type="text" onfocus="focus_event()" onblur="blur_event()">
    
    <script>
        function click_event(){
            alert('点击事件触发')
        }

        function focus_event(){
            console.log('获取焦点'); 
        }

        function blur_event(){
            console.log('失去焦点'); 
        }
    </script>
</body>
</html>
