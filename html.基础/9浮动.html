<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>浮动</title>
    <!--
        浮动：改变默认排列顺序，让多个块级元素在同一行内排列显示（相互贴靠，无间隙），浮动相对于父元素浮动，只在父元素内部浮动
        语法：
        选择器{
            float:left/right/none;
        }
        特性：脱离标准流，一行显示顶端对齐，具备行内块元素特性
    -->
    <!--
        清除浮动：
                父元素中添加 overflow:hidden
                伪元素清除法：
                            .father::after{
                                content: "";
                                display: table;
                                clear: both;
                            }
    -->
    <style>
        .father{
            background-color: aquamarine;
            border: 3px,solid,pink;
            /*height: 150px;*/
            overflow: hidden;
        }
        .father::after{
            content: "";
            display: table;
            clear: both;
        }

        .left_son{
            background-color: yellowgreen;
            width: 100px;
            height: 100px;
            border: 5px,solid,black;
            float: left;
        }
        .right_son{
            background-color: yellow;
            width: 100px;
            height: 100px;
            border: 5px,dotted,black;
            float: right;
        }
    </style>
</head>
<body>
    <div class="father">
        <div class="left_son">左浮动</div>
        <div class="right_son">右浮动</div>
    </div>
    <p>这是一段文本这是一段文本这是一段文本这是一段文本这是一段文本这是一段文本</p>
</body>
</html>
