<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!--
        Dom对象常用方法
        appendChild() 把新的子节点添加到指定节点
        removeChild() 删除子节点
        replaceChild() 替换子节点
        insertBefore() 在指定的子节点前面插入新的子节点
        createAttribute() 创建属性节点
        createElement() 创建元素节点
        createTextNode() 创建文本节点
        getAttribute() 返回指定的属性值
    -->
</head>
<body>
    <div id="box1">这是一个ID选择器标签</div>
    <div class="box2">这是一个类选择器标签</div>
    <div>普通的div标签</div>
    <button>点击按钮</button>

    <script>
        let element_id=document.getElementById('box1');
        console.log(element_id);
        
        let element_class=document.getElementsByClassName('box2')[0];
        console.log(element_class);

        let element_tag=document.getElementsByTagName('div')[2];
        console.log(element_tag);

        /*
            修改标签 innerHTML和innerText区别
            innerHTML解析标记，更新内容
            innerText纯文本处理
        */
        element_id.innerHTML='修改后的ID选择器标签文本内容';
        element_class.innerText='修改后的类选择文本';
        element_id.innerHTML='<a href="#">跳转链接</a>';
        element_class.innerText='<a href="#">跳转链接</a>';

        //修改属性
        element_tag.style.color='red';
        element_tag.style.fontSize='20px';

        //通过DOM属性绑定事件
        let button_element=document.getElementsByTagName('button')[0];
        /*button_element.onclick=function(){
            alert('Dom属性按键触发');
        }
        */
        button_element.addEventListener('click',function(){
            alert('addEventListener按键触发');
        })
    </script>
</body>
</html>
