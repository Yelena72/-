<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex弹性盒子模型</title>
    <!--
        Flex容器属性： 
            flex-direction
            flex-wrap
            flex-flow(复合属性): flex-direction && flex-wrap
            justify-content
            align-items
            align-content:多轴线对齐方式
    -->
    <!--
        flex-direction:决定主轴的方向（即项目的排列方向）
            row(默认值)：主轴为水平方向，起点在左端（项目从左往右排列）
            row-reverse：主轴为水平方向，起点在右端（项目从右往左排列）
            column：主轴为垂直方向，起点在上沿（项目从上往下排列）
            column-reverse：主轴为垂直方向，起点在下沿（项目从下往上排列）
    -->
    <!--
        flex-wrap：默认项目排在一条轴线上，一条轴线排不下则换行
            nowrap(默认)：不换行
            wrap：主轴为横向时，从上到下换行；主轴为纵向时，从左到右换行
            wrap-reverse：主轴为横向时，从下到上换行；主轴为纵向时，从右到左换行
    -->
    <!--
        justify-content:定义了项目在主轴上的对齐方式
            flex-start(默认)：与主轴的起点对齐
            flex-end：与主轴的终点对齐
            center：与主轴的中点对齐
            space-between：两端对齐主轴的起点与终点，项目之间的间隔都相等
            space-around：每个项目两侧的间隔相等，项目之间的间隔 比 项目与边框的间隔 大一倍
            space-evenly：每个项目之间的间隔、项目与边框的间隔相等
    -->
    <!--
        align-items:定义项目在交叉轴上如何对齐
            flex-start：交叉轴的起点对齐
            flex-end：交叉轴的终点对齐
            center：交叉轴的中点对齐
            baseline：项目的第一行文字的基线对齐
            stretch(默认值)：如果项目未设置高度 或 设为auto，项目将占满整个容器的高度
    -->
    <!--
        align-content:定义多跟轴线的对齐方式，如果项目只有一根轴线，该属性不起作用
            flex-start：与交叉轴的起点对齐
            flex-end：与交叉轴的终点对齐
            center：与交叉轴的中点对齐
            space-between：与交叉轴两端对齐，轴线之间的间隔平均分布
            space-around：每根轴线两侧的间隔都相等，轴线之间的间隔 比 轴线与边框的间隔 大一倍
            stretch(默认值)：主轴线占满整个交叉轴
    -->
    <style>
        html{
            font-size: 10px;
        }
        .container{
            display: flex;
            height: 400px;
            background-color: aqua;
            /* flex-direction: column; */
            flex-wrap: wrap;
            /* justify-content: space-around; */
            /* align-items: center; */
            align-content: center;
        }
        .item{
            width: 15rem;
            font-size: 8rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item" style="background-color: pink;">1</div>
        <div class="item" style="background-color: yellow;">2</div>
        <div class="item" style="background-color: goldenrod;">3</div>
        <div class="item" style="background-color: burlywood;">4</div>
        <div class="item" style="background-color: fuchsia;">5</div>
        <div class="item" style="background-color: darkseagreen;">6</div>
    </div>
</body>
</html>
